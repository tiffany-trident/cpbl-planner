<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPBL 2026 看球行程規劃器</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background: #faf8f5; color: #3d3529; min-height: 100vh; }

.container { max-width: 1100px; margin: 0 auto; }

/* ── 棒球縫線 SVG 背景 ── */
.header {
  background: linear-gradient(135deg, #faf8f5 0%, #f3efe8 100%);
  padding: 28px 24px 22px;
  border-bottom: 2px solid #e8e0d4;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 30%, #f5f0e8 60%, transparent 61%);
  box-shadow: inset 0 0 0 2px #d4c9b8;
  opacity: 0.5;
}
.header::after {
  content: '';
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 70px;
  border-right: 2px dashed #c4a882;
  border-radius: 0 50% 50% 0;
  opacity: 0.35;
}
.header h1 { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 24px; color: #2a2318; margin-bottom: 4px; font-weight: 700; letter-spacing: 1px; position: relative; z-index: 1; }
.header p { color: #8c7e6a; font-size: 13px; letter-spacing: 0.5px; position: relative; z-index: 1; }

/* ── 戰績總覽 ── */
.standings-wrap { padding: 14px 24px; background: #fefdfb; border-bottom: 1px solid #e8e0d4; }
.standings-title { font-size: 12px; color: #a89a85; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.standings-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.standing-card { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 10px; background: #faf8f5; border: 1px solid #ece6db; min-width: 160px; flex: 1; }
.standing-card img { width: 28px; height: 28px; object-fit: contain; }
.standing-info { display: flex; flex-direction: column; }
.standing-name { font-size: 13px; font-weight: 600; color: #3d3529; }
.standing-record { font-size: 12px; color: #8c7e6a; }
.standing-pct { font-size: 14px; font-weight: 700; margin-left: auto; padding-left: 8px; }

.filters { background: #fefdfb; padding: 18px 24px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; border-bottom: 1px solid #e8e0d4; }
.filter-group { display: flex; flex-direction: column; gap: 5px; }
.filter-group > label { font-size: 11px; color: #a89a85; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.filter-group select { background: #fefdfb; border: 1px solid #d9cebb; color: #3d3529; padding: 8px 12px; border-radius: 6px; font-size: 14px; min-width: 130px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
.filter-group select:focus { outline: none; border-color: #b8956a; box-shadow: 0 0 0 3px rgba(184,149,106,0.15); }

.cb-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
.checkbox-group { display: flex; align-items: center; gap: 5px; }
.checkbox-group input[type="checkbox"] { width: 16px; height: 16px; accent-color: #b8956a; cursor: pointer; }
.checkbox-group label { font-size: 14px; cursor: pointer; user-select: none; color: #5c4f3d; }

/* ── 三段切換 ── */
.toggle-group { display: inline-flex; border: 1px solid #d9cebb; border-radius: 8px; overflow: hidden; }
.toggle-btn { padding: 7px 16px; font-size: 13px; cursor: pointer; border: none; background: #fefdfb; color: #8c7e6a; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
.toggle-btn:not(:last-child) { border-right: 1px solid #d9cebb; }
.toggle-btn.active { background: #b8956a; color: #fff; }
.toggle-btn:hover:not(.active) { background: #f5f0e8; color: #5c4f3d; }

.stats { background: #fefdfb; padding: 8px 24px; display: flex; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid #e8e0d4; font-size: 13px; color: #a89a85; }
.stats span.num { color: #b8956a; font-weight: 700; }

.table-wrap { padding: 16px 24px 32px; overflow-x: auto; }
table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fefdfb; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(60,45,20,0.06); }
thead th { background: #f5f0e8; color: #a89a85; padding: 11px 12px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; position: sticky; top: 0; z-index: 10; white-space: nowrap; border-bottom: 1px solid #e8e0d4; }
tbody tr { border-bottom: 1px solid #f0ebe3; transition: background 0.15s; }
tbody tr:hover { background: #f9f5ef; }
tbody tr.row-today { background: #fff8f0; }
tbody tr.row-today:hover { background: #fff3e3; }
tbody td { padding: 9px 12px; font-size: 14px; white-space: nowrap; border-bottom: 1px solid #f0ebe3; }
tr.date-separator td { padding: 0; height: 6px; background: #f5f0e8; border-bottom: 1px solid #e8e0d4; }

.day-sat { color: #6b8cce; font-weight: 600; }
.day-sun { color: #c96b6b; font-weight: 600; }
.day-hol { color: #c49a4a; font-weight: 600; }

.badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 4px; vertical-align: middle; }
.badge-sat { background: #eef2fa; color: #6b8cce; }
.badge-sun { background: #faf0f0; color: #c96b6b; }
.badge-hol { background: #faf5eb; color: #b8956a; }
.badge-future { background: #eef6f0; color: #5a9a6b; }
.badge-past { background: #f0ebe3; color: #b0a593; }
.badge-postponed { background: #f5eef8; color: #9b7db8; }
.badge-today { background: #fff3e0; color: #d48c2e; }

/* ── 對戰組合 ── */
.matchup { display: inline-flex; align-items: center; gap: 0; }
.matchup-team { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: 600; }
.matchup-team img { width: 22px; height: 22px; object-fit: contain; }
.matchup-at { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: #f0ebe3; color: #b0a593; font-size: 11px; font-weight: 700; flex-shrink: 0; font-style: italic; }
.team-brothers { background: #fdf8ea; color: #a6880f; border: 1px solid #f0e3a8; }
.team-lions { background: #fdf4ec; color: #b05a18; border: 1px solid #f0cfaa; }
.team-monkeys { background: #fbefef; color: #a62020; border: 1px solid #e8bfbf; }
.team-guardians { background: #edf2fb; color: #2e5aab; border: 1px solid #b8ccec; }
.team-dragons { background: #f3eefb; color: #6a30c4; border: 1px solid #cfc0e8; }
.team-hawks { background: #edf6f0; color: #1a6b3a; border: 1px solid #a8dbb8; }

/* ── 比分顯示 ── */
.score-display { display: inline-flex; align-items: center; gap: 6px; margin-left: 8px; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; }
.score-num { min-width: 20px; text-align: center; }
.score-sep { color: #b0a593; font-size: 12px; }
.score-win { color: #b8956a; }
.score-lose { color: #b0a593; }
.score-postponed { font-size: 12px; color: #9b7db8; font-weight: 600; font-family: 'Noto Sans TC', sans-serif; }

/* ── 比賽詳情 ── */
.game-detail { font-size: 12px; color: #8c7e6a; margin-top: 4px; line-height: 1.6; display: flex; flex-wrap: wrap; gap: 4px 12px; }
.detail-item { display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }
.detail-label { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; line-height: 1.4; }
.detail-label-w { background: #eef6f0; color: #5a9a6b; }
.detail-label-l { background: #faf0f0; color: #c96b6b; }
.detail-label-sv { background: #eef2fa; color: #6b8cce; }
.detail-label-mvp { background: #faf5eb; color: #b8956a; }

.filter-row { display: flex; gap: 14px; }

.empty { text-align: center; padding: 48px 20px; color: #b0a593; font-size: 15px; font-family: 'Noto Serif TC', serif; }

.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { display: inline-flex; align-items: center; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #d9cebb; background: #fefdfb; color: #8c7e6a; transition: all 0.18s; user-select: none; }
.chip:hover { border-color: #b8956a; color: #b8956a; background: #faf5ef; }
.chip.active { color: #fff; border-color: transparent; }
.chip.active[data-team="中信兄弟"] { background: #c49a20; }
.chip.active[data-team="統一7-ELEVEn獅"] { background: #c46a18; }
.chip.active[data-team="樂天桃猿"] { background: #b52828; }
.chip.active[data-team="富邦悍將"] { background: #3468c0; }
.chip.active[data-team="味全龍"] { background: #6d30b8; }
.chip.active[data-team="台鋼雄鷹"] { background: #1a6b3a; }

.btn-reset { background: #f5f0e8; color: #5c4f3d; border: 1px solid #d9cebb; padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans TC', sans-serif; letter-spacing: 0.5px; }
.btn-reset:hover { background: #ebe4d8; border-color: #b8956a; }

.btn-ticket { display: inline-block; padding: 4px 12px; border-radius: 14px; font-size: 12px; font-weight: 600; color: #b8956a; background: #faf5ef; border: 1px solid #d9c9ad; text-decoration: none; transition: all 0.18s; letter-spacing: 0.5px; font-family: 'Noto Sans TC', sans-serif; }
.btn-ticket:hover { background: #b8956a; color: #fff; border-color: #b8956a; }
.btn-hsr { display: inline-block; padding: 4px 12px; border-radius: 14px; font-size: 12px; font-weight: 600; color: #2b8a8a; background: #eef7f7; border: 1px solid #b0d8d8; text-decoration: none; transition: all 0.18s; letter-spacing: 0.5px; font-family: 'Noto Sans TC', sans-serif; margin-left: 6px; }
.btn-hsr:hover { background: #2b8a8a; color: #fff; border-color: #2b8a8a; }

/* ── 手機卡片模式 ── */
.card-list { display: none; }
.game-card { background: #fefdfb; border-radius: 12px; padding: 14px 16px; box-shadow: 0 2px 8px rgba(60,45,20,0.06); border: 1px solid #ece6db; }
.game-card.card-today { background: #fff8f0; border-color: #f0d9b5; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.card-date { font-size: 14px; font-weight: 600; color: #3d3529; font-family: 'Noto Serif TC', serif; }
.card-time { font-size: 13px; color: #a89a85; }
.card-matchup { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 0; }
.card-team { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 72px; }
.card-team img { width: 38px; height: 38px; object-fit: contain; }
.card-team-name { font-size: 13px; font-weight: 600; }
.card-score { font-size: 22px; font-weight: 800; font-family: 'Inter', sans-serif; min-width: 28px; text-align: center; }
.card-vs { font-size: 11px; color: #b0a593; font-weight: 700; font-style: italic; background: #f0ebe3; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.card-detail { text-align: center; font-size: 12px; color: #8c7e6a; padding: 4px 0 8px; line-height: 1.6; }
.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e8e0d4; }
.card-field { font-size: 12px; color: #5c4f3d; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }

/* ── 頁尾 ── */
.footer { text-align: center; padding: 20px; color: #c4b9a8; font-size: 12px; letter-spacing: 0.5px; }
.footer .stitch { display: inline-block; letter-spacing: 3px; color: #d4c4ab; margin-bottom: 4px; }

@media (max-width: 768px) {
  .container { max-width: 100%; }
  .filters { padding: 14px; gap: 10px; flex-direction: column; align-items: stretch; }
  .filter-group { width: 100%; }
  .filter-group select { width: 100%; min-width: unset; }
  .filter-row { display: flex; gap: 10px; }
  .filter-row .filter-group { flex: 1; }
  .cb-row { gap: 10px; }
  .header { padding: 20px 16px 18px; }
  .header h1 { font-size: 19px; }
  .header p { font-size: 12px; }
  .header::before { width: 60px; height: 60px; right: 16px; }
  .header::after { right: 28px; width: 30px; height: 52px; }
  .stats { padding: 8px 14px; font-size: 12px; gap: 6px; }
  .table-wrap { display: none; }
  .card-list { display: flex; flex-direction: column; gap: 10px; padding: 12px 14px 28px; }
  .chip { padding: 6px 11px; font-size: 12px; }
  .btn-reset { width: 100%; text-align: center; }
  .standings-wrap { padding: 12px 14px; }
  .standings-grid { gap: 6px; }
  .standing-card { min-width: calc(50% - 3px); flex: unset; padding: 6px 10px; }
  .standing-card img { width: 22px; height: 22px; }
  .standing-name { font-size: 12px; }
  .standing-record { font-size: 11px; }
  .standing-pct { font-size: 13px; }
  .toggle-btn { padding: 6px 12px; font-size: 12px; }
}

@media (min-width: 769px) and (max-width: 1024px) {
  .table-wrap { padding: 14px 18px 28px; }
  .filters { padding: 16px 18px; }
  .header { padding: 22px 18px 20px; }
  .stats { padding: 8px 18px; }
  .standings-wrap { padding: 12px 18px; }
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <h1>&#9918; CPBL 2026 看球行程規劃器</h1>
  <p>中華職棒一軍例行賽 &#8212; 在最好的日子，走進最好的球場</p>
</div>

<div class="standings-wrap" id="standings-wrap">
  <div class="standings-title">各隊戰績</div>
  <div class="standings-grid" id="standings-grid"></div>
</div>

<div class="filters">
  <div class="filter-group">
    <label>想看的隊伍</label>
    <div class="chip-group" id="f-team1"></div>
  </div>
  <div class="filter-group">
    <label>對手</label>
    <div class="chip-group" id="f-team2"></div>
  </div>
  <div class="filter-row">
    <div class="filter-group">
      <label>球場</label>
      <select id="f-field"><option value="">全部球場</option></select>
    </div>
    <div class="filter-group">
      <label>月份</label>
      <select id="f-month"><option value="">全部月份</option></select>
    </div>
  </div>
  <div class="filter-group">
    <label>場次狀態</label>
    <div class="cb-row">
      <div class="toggle-group" id="f-status">
        <button class="toggle-btn active" data-val="future">未來場次</button>
        <button class="toggle-btn" data-val="all">全部</button>
        <button class="toggle-btn" data-val="past">已結束</button>
      </div>
    </div>
  </div>
  <div class="filter-group">
    <label>日期篩選</label>
    <div class="cb-row">
      <div class="checkbox-group">
        <input type="checkbox" id="f-weekend"><label for="f-weekend">週末</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="f-holiday"><label for="f-holiday">週末+國定假日</label>
      </div>
    </div>
  </div>
  <div class="filter-group" style="justify-content:flex-end">
    <button class="btn-reset" id="btn-reset">重設篩選</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr><th>日期</th><th>星期</th><th>時間</th><th>對戰組合</th><th>比分</th><th>球場</th><th>標籤</th><th></th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty-table" style="display:none">沒有符合條件的場次</div>
</div>

<div class="card-list" id="card-list"></div>
<div class="card-list empty" id="empty-card" style="display:none">沒有符合條件的場次</div>

<div class="footer">
  <div class="stitch">~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~</div><br>
  CPBL 2026 &#183; 享受每一場比賽的美好時光
</div>

</div>

<script>
// ── 台灣 2026 國定假日 ──
const HOLIDAYS = {

  '2026-01-02': '元旦彈性',

  return url ? '<img src="' + url + '" alt="" style="width:' + size + 'px;height:' + size + 'px;object-fit:contain;vertical-align:middle;margin-right:4px;">' : '';
}
const TEAM_SHORT = {

};
const TEAM_TICKET = {

  '中信兄弟': 'https://tix.brothers.tw/',
  '統一7-ELEVEn獅': 'https://ticket.ibon.com.tw/Index/Sport',
  '富邦悍將': 'https://guardians.fami.life/',
  '味全龍': 'https://tix.wdragons.com/',
  '台鋼雄鷹': 'https://ticket.tsghawks.com/',
};
const STADIUM_HSR = {
  '大巨蛋': '台北',
  '天母': '台北',
  '新莊': '板橋',
  '樂天桃園': '桃園',
  '洲際': '台中',
  '嘉義市': '嘉義',
  '亞太主': '台南',
  '澄清湖': '左營',
  '斗六': '雲林',
};
const HSR_BOOKING_URL = 'https://irs.thsrc.com.tw/IMINT/';
const DAYS = ['日','一','二','三','四','五','六'];

let allGames = [];
let statusFilter = 'future'; // 'all' | 'future' | 'past'

// ── RAW_DATA: [日期, 時間, 客隊, 主隊, 球場, 客分, 主分, 勝投, 敗投, 救援, MVP, GameResult] ──

// ── 載入資料 ──
function loadData() {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0, 10);
  allGames = RAW_DATA.map(r => {
    const [date, time, visitor, home, field, vScore, hScore, wp, lp, sv, mvp, gr] = r;
    const d = new Date(date + 'T00:00:00');
    const dow = d.getDay();
    const completed = gr === '0' && (vScore > 0 || hScore > 0 || wp !== '');
    const postponed = gr === '1';
    return {
      date, time, visitor, home, field,
      vScore, hScore, wp, lp, sv, mvp, gr,
      d, dow,
      dayName: DAYS[dow],
      isWE: dow === 0 || dow === 6,
      holName: HOLIDAYS[date] || '',
      month: d.getMonth() + 1,
      isFuture: d >= today,
      isToday: date === todayStr,
      completed,
      postponed,
    };
  }).sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : a.time < b.time ? -1 : 1);
  buildStandings();
  initFilters();
  render();
}

// ── 戰績計算 ──
function buildStandings() {
  const teams = {};
  allGames.forEach(g => {
    if (!g.completed) return;
    [g.visitor, g.home].forEach(t => {
      if (!teams[t]) teams[t] = { w: 0, l: 0, t: 0 };
    });
    if (g.vScore > g.hScore) {
      teams[g.visitor].w++;
      teams[g.home].l++;
    } else if (g.hScore > g.vScore) {
      teams[g.home].w++;
      teams[g.visitor].l++;
    } else {
      teams[g.visitor].t++;
      teams[g.home].t++;
    }
  });

  const sorted = Object.entries(teams)
    .map(([name, r]) => ({
      name,
      ...r,
      pct: (r.w + r.l) > 0 ? (r.w / (r.w + r.l)).toFixed(3) : '.000'
    }))
    .sort((a, b) => parseFloat(b.pct) - parseFloat(a.pct));

  const grid = document.getElementById('standings-grid');
  if (!sorted.length) {
    document.getElementById('standings-wrap').style.display = 'none';
    return;
  }
  grid.innerHTML = sorted.map(t => {
    const logo = TEAM_LOGO[t.name] || '';
    const color = getTeamColor(t.name);
    return '<div class="standing-card">' +
      (logo ? '<img src="' + logo + '" alt="">' : '') +
      '<div class="standing-info">' +
        '<span class="standing-name">' + (TEAM_SHORT[t.name] || t.name) + '</span>' +
        '<span class="standing-record">' + t.w + '勝 ' + t.l + '敗' + (t.t ? ' ' + t.t + '和' : '') + '</span>' +
      '</div>' +
      '<span class="standing-pct" style="color:' + color + '">' + t.pct + '</span>' +
    '</div>';
  }).join('');
}

function getSelectedTeams(containerId) {
  return [...document.querySelectorAll('#' + containerId + ' .chip.active')].map(c => c.dataset.team);
}

function initFilters() {
  const teams = [...new Set(allGames.flatMap(g => [g.visitor, g.home]))].sort();
  const fields = [...new Set(allGames.map(g => g.field))].sort();
  const months = [...new Set(allGames.map(g => g.month))].sort((a,b) => a - b);

  // Team chip buttons
  ['f-team1','f-team2'].forEach(id => {
    const container = document.getElementById(id);
    teams.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.dataset.team = t;
      chip.innerHTML = logoImg(t, 18) + (TEAM_SHORT[t] || t);
      chip.addEventListener('click', () => { chip.classList.toggle('active'); render(); });
      container.appendChild(chip);
    });
  });

  const addOpts = (sel, items, fn) => items.forEach(i => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = fn ? fn(i) : i;
    sel.appendChild(o);
  });
  addOpts(document.getElementById('f-field'), fields);
  addOpts(document.getElementById('f-month'), months, m => m + ' 月');
}

function getFiltered() {
  const sel1 = getSelectedTeams('f-team1');
  const sel2 = getSelectedTeams('f-team2');
  const fld = document.getElementById('f-field').value;
  const mon = document.getElementById('f-month').value;
  const we = document.getElementById('f-weekend').checked;
  const hol = document.getElementById('f-holiday').checked;

  return allGames.filter(g => {
    // Team 1 filter: at least one selected team must be in the game (either side)
    if (sel1.length && !sel1.includes(g.visitor) && !sel1.includes(g.home)) return false;
    // Team 2 (opponent) filter: at least one selected opponent must be in the game
    if (sel2.length && !sel2.includes(g.visitor) && !sel2.includes(g.home)) return false;
    // If both filters set, the game must involve one from each group
    if (sel1.length && sel2.length) {
      const ok = (sel1.includes(g.visitor) && sel2.includes(g.home)) ||
                 (sel2.includes(g.visitor) && sel1.includes(g.home));
      if (!ok) return false;
    }
    if (fld && g.field !== fld) return false;
    if (mon && g.month !== +mon) return false;
    if (we && !g.isWE) return false;
    if (hol && !g.isWE && !g.holName) return false;
    // Status filter
    if (statusFilter === 'future' && !g.isFuture) return false;
    if (statusFilter === 'past' && g.isFuture) return false;
    return true;
  });
}

function buildTags(g) {
  let tags = '';
  if (g.isToday) tags += '<span class="badge badge-today">今日</span>';
  if (g.dow === 6) tags += '<span class="badge badge-sat">週六</span>';
  if (g.dow === 0) tags += '<span class="badge badge-sun">週日</span>';
  if (g.holName) tags += '<span class="badge badge-hol">' + g.holName + '</span>';
  if (g.postponed) {
    tags += '<span class="badge badge-postponed">延賽</span>';
  } else if (statusFilter === 'all') {
    // 只在「全部」模式下才顯示狀態 badge，避免冗餘
    if (g.completed) tags += '<span class="badge badge-past">已結束</span>';
    else tags += '<span class="badge badge-future">未來</span>';
  }
  return tags;
}

function buildScore(g) {
  if (g.postponed) return '<span class="score-postponed">延賽</span>';
  if (!g.completed) return '';
  const vWin = g.vScore > g.hScore;
  const hWin = g.hScore > g.vScore;
  return '<span class="score-display">' +
    '<span class="score-num ' + (vWin ? 'score-win' : 'score-lose') + '">' + g.vScore + '</span>' +
    '<span class="score-sep">:</span>' +
    '<span class="score-num ' + (hWin ? 'score-win' : 'score-lose') + '">' + g.hScore + '</span>' +
    '</span>';
}

function buildDetail(g) {
  if (!g.completed || (!g.wp && !g.mvp)) return '';
  let parts = [];
  if (g.wp) parts.push('<span class="detail-item"><span class="detail-label detail-label-w">W</span>' + g.wp + '</span>');
  if (g.lp) parts.push('<span class="detail-item"><span class="detail-label detail-label-l">L</span>' + g.lp + '</span>');
  if (g.sv) parts.push('<span class="detail-item"><span class="detail-label detail-label-sv">SV</span>' + g.sv + '</span>');
  if (g.mvp) parts.push('<span class="detail-item"><span class="detail-label detail-label-mvp">MVP</span>' + g.mvp + '</span>');
  return '<div class="game-detail">' + parts.join('') + '</div>';
}

function render() {
  const list = getFiltered();
  const tbody = document.getElementById('tbody');
  const emptyTable = document.getElementById('empty-table');
  const emptyCard = document.getElementById('empty-card');
  const cardList = document.getElementById('card-list');
  const stats = document.getElementById('stats');

  const weCnt = list.filter(g => g.isWE).length;
  const holCnt = list.filter(g => g.holName && !g.isWE).length;
  // 已完賽/未來/延賽 用全部資料計算，避免篩選模式下數字誤導
  const totalDone = allGames.filter(g => g.completed).length;
  const totalFut = allGames.filter(g => g.isFuture && !g.postponed).length;
  const totalPostponed = allGames.filter(g => g.postponed).length;

  stats.innerHTML =
    '篩選結果：<span class="num">' + list.length + '</span> 場' +
    ' | 已完賽：<span class="num">' + totalDone + '</span> 場' +
    ' | 未來：<span class="num">' + totalFut + '</span> 場' +
    ' | 延賽：<span class="num">' + totalPostponed + '</span> 場' +
    ' | 週末：<span class="num">' + weCnt + '</span> 場' +
    ' | 假日(非週末)：<span class="num">' + holCnt + '</span> 場';

  if (!list.length) {
    tbody.innerHTML = '';
    cardList.innerHTML = '';
    emptyTable.style.display = '';
    emptyCard.style.display = '';
    return;
  }
  emptyTable.style.display = 'none';
  emptyCard.style.display = 'none';

  // Desktop table
  let html = '';
  let prevDate = '';
  for (let i = 0; i < list.length; i++) {
    const g = list[i];
    const isNewDate = g.date !== prevDate;
    // 日期分隔列（非第一組才加）
    if (isNewDate && prevDate !== '') {
      html += '<tr class="date-separator"><td colspan="8"></td></tr>';
    }
    prevDate = g.date;

    const dc = g.dow === 0 ? 'day-sun' : g.dow === 6 ? 'day-sat' : g.holName ? 'day-hol' : '';
    const vs = TEAM_SHORT[g.visitor] || g.visitor;
    const hs = TEAM_SHORT[g.home] || g.home;
    const vc = TEAM_CLS[g.visitor] || '';
    const hc = TEAM_CLS[g.home] || '';
    const vLogo = TEAM_LOGO[g.visitor] || '';
    const hLogo = TEAM_LOGO[g.home] || '';

    const matchup = '<div class="matchup">' +
      '<span class="matchup-team ' + vc + '">' + (vLogo ? '<img src="' + vLogo + '" alt="">' : '') + vs + '</span>' +
      '<span class="matchup-at">@</span>' +
      '<span class="matchup-team ' + hc + '">' + (hLogo ? '<img src="' + hLogo + '" alt="">' : '') + hs + '</span>' +
      '</div>';

    const score = buildScore(g);
    const detail = buildDetail(g);

    const ticketUrl = g.isFuture && !g.postponed ? (TEAM_TICKET[g.home] || '') : '';
    const ticketLink = ticketUrl ? '<a class="btn-ticket" href="' + ticketUrl + '" target="_blank" rel="noopener">購票</a>' : '';
    const hsrStation = g.isFuture && !g.postponed ? (STADIUM_HSR[g.field] || '') : '';
    const hsrLink = hsrStation ? '<a class="btn-hsr" href="' + HSR_BOOKING_URL + '" target="_blank" rel="noopener" title="請至高鐵網站選擇到站：' + hsrStation + '">高鐵→' + hsrStation + '</a>' : '';

    const rowClass = g.isToday ? ' class="row-today"' : '';

    html += '<tr' + rowClass + '>' +
      '<td>' + (isNewDate ? g.date : '') + '</td>' +
      '<td class="' + dc + '">' + (isNewDate ? g.dayName : '') + '</td>' +
      '<td>' + g.time + '</td>' +
      '<td>' + matchup + '</td>' +
      '<td>' + score + detail + '</td>' +
      '<td>' + g.field + '</td>' +
      '<td>' + buildTags(g) + '</td>' +
      '<td>' + ticketLink + hsrLink + '</td></tr>';
  }
  tbody.innerHTML = html;

  // Mobile cards
  let cards = '';
  let prevCardDate = '';
  for (const g of list) {
    // 同日分組標題
    if (g.date !== prevCardDate) {
      const dc = g.dow === 0 ? 'day-sun' : g.dow === 6 ? 'day-sat' : g.holName ? 'day-hol' : '';
      cards += '<div style="font-size:13px;font-weight:600;color:#8c7e6a;padding:' + (prevCardDate ? '12px' : '0') + ' 0 4px;border-top:' + (prevCardDate ? '1px solid #e8e0d4' : 'none') + '">' +
        '<span class="' + dc + '">' + g.date + '（' + g.dayName + '）</span>' +
        (g.holName ? ' <span class="badge badge-hol" style="margin-left:6px">' + g.holName + '</span>' : '') +
        (g.isToday ? ' <span class="badge badge-today" style="margin-left:4px">今日</span>' : '') +
        '</div>';
      prevCardDate = g.date;
    }

    const vs = TEAM_SHORT[g.visitor] || g.visitor;
    const hs = TEAM_SHORT[g.home] || g.home;
    const vLogo = TEAM_LOGO[g.visitor] || '';
    const hLogo = TEAM_LOGO[g.home] || '';
    const showScore = g.completed && !g.postponed;

    const centerPart = showScore
      ? '<span class="card-score ' + (g.vScore > g.hScore ? 'score-win' : 'score-lose') + '">' + g.vScore + '</span>' +
        '<span class="card-vs">:</span>' +
        '<span class="card-score ' + (g.hScore > g.vScore ? 'score-win' : 'score-lose') + '">' + g.hScore + '</span>'
      : g.postponed
        ? '<span class="score-postponed" style="font-size:14px">延賽</span>'
        : '<span class="card-vs">@</span>';

    const ticketUrl = g.isFuture && !g.postponed ? (TEAM_TICKET[g.home] || '') : '';
    const hsrStation = g.isFuture && !g.postponed ? (STADIUM_HSR[g.field] || '') : '';
    const detail = buildDetail(g);
    const todayClass = g.isToday ? ' card-today' : '';

    const cardButtons = (ticketUrl || hsrStation) ? '<div style="margin-top:10px;display:flex;justify-content:center;gap:8px">' +
      (ticketUrl ? '<a class="btn-ticket" href="' + ticketUrl + '" target="_blank" rel="noopener">前往購票</a>' : '') +
      (hsrStation ? '<a class="btn-hsr" href="' + HSR_BOOKING_URL + '" target="_blank" rel="noopener">高鐵訂票（' + hsrStation + '站）</a>' : '') +
      '</div>' : '';

    cards += '<div class="game-card' + todayClass + '">' +
      '<div class="card-header">' +
        '<span class="card-time">' + g.time + '</span>' +
      '</div>' +
      '<div class="card-matchup">' +
        '<div class="card-team">' +
          (vLogo ? '<img src="' + vLogo + '" alt="">' : '') +
          '<span class="card-team-name" style="color:' + getTeamColor(g.visitor) + '">' + vs + '</span>' +
        '</div>' +
        centerPart +
        '<div class="card-team">' +
          (hLogo ? '<img src="' + hLogo + '" alt="">' : '') +
          '<span class="card-team-name" style="color:' + getTeamColor(g.home) + '">' + hs + '</span>' +
        '</div>' +
      '</div>' +
      (detail ? '<div class="card-detail">' + detail + '</div>' : '') +
      '<div class="card-footer">' +
        '<span class="card-field">' + g.field + '</span>' +
        '<div class="card-tags">' + buildTags(g) + '</div>' +
      '</div>' +
      cardButtons +
    '</div>';
  }
  cardList.innerHTML = cards;
}

function getTeamColor(team) {
  const colors = { '中信兄弟':'#b7950b', '統一7-ELEVEn獅':'#c0611a', '樂天桃猿':'#b91c1c', '富邦悍將':'#2b5fc3', '味全龍':'#7c3aed', '台鋼雄鷹':'#16794a' };
  return colors[team] || '#2c3e50';
}

// ── 事件綁定 ──
['f-field','f-month'].forEach(id =>
  document.getElementById(id).addEventListener('change', render));
['f-weekend','f-holiday'].forEach(id =>
  document.getElementById(id).addEventListener('change', function() {
    if (id === 'f-weekend' && this.checked) document.getElementById('f-holiday').checked = false;
    if (id === 'f-holiday' && this.checked) document.getElementById('f-weekend').checked = false;
    render();
  }));

// Status toggle
document.querySelectorAll('#f-status .toggle-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#f-status .toggle-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    statusFilter = this.dataset.val;
    render();
  });
});

document.getElementById('btn-reset').addEventListener('click', function() {
  document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
  ['f-field','f-month'].forEach(id => document.getElementById(id).value = '');
  ['f-weekend','f-holiday'].forEach(id => document.getElementById(id).checked = false);
  document.querySelectorAll('#f-status .toggle-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('#f-status .toggle-btn[data-val="future"]').classList.add('active');
  statusFilter = 'future';
  render();
});
