<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPBL 2026 看球行程規劃器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif; background: #f5f6fa; color: #2c3e50; min-height: 100vh; }

.container { max-width: 1100px; margin: 0 auto; }

.header { background: #fff; padding: 18px 20px; border-bottom: 1px solid #e0e4ed; }
.header h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 2px; font-weight: 700; }
.header p { color: #7f8c9b; font-size: 13px; }

.filters { background: #fff; padding: 16px 20px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; border-bottom: 1px solid #e0e4ed; }
.filter-group { display: flex; flex-direction: column; gap: 5px; }
.filter-group > label { font-size: 12px; color: #7f8c9b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.filter-group select { background: #fff; border: 1px solid #d0d5e0; color: #2c3e50; padding: 7px 12px; border-radius: 8px; font-size: 14px; min-width: 130px; cursor: pointer; }
.filter-group select:focus { outline: none; border-color: #5b7fff; box-shadow: 0 0 0 3px rgba(91,127,255,0.12); }

.cb-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
.checkbox-group { display: flex; align-items: center; gap: 5px; }
.checkbox-group input[type="checkbox"] { width: 16px; height: 16px; accent-color: #5b7fff; cursor: pointer; }
.checkbox-group label { font-size: 14px; cursor: pointer; user-select: none; color: #4a5568; }

.stats { background: #fff; padding: 8px 20px; display: flex; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid #e0e4ed; font-size: 13px; color: #7f8c9b; }
.stats span.num { color: #5b7fff; font-weight: 700; }

.table-wrap { padding: 12px 20px 32px; overflow-x: auto; }
table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
thead th { background: #f8f9fc; color: #7f8c9b; padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 10; white-space: nowrap; border-bottom: 1px solid #e0e4ed; }
tbody tr { border-bottom: 1px solid #f0f1f5; transition: background 0.12s; }
tbody tr:hover { background: #f5f7ff; }
tbody td { padding: 8px 12px; font-size: 14px; white-space: nowrap; border-bottom: 1px solid #f0f1f5; }

.day-sat { color: #5b7fff; font-weight: 600; }
.day-sun { color: #e55c6c; font-weight: 600; }
.day-hol { color: #e8913a; font-weight: 600; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 4px; vertical-align: middle; }
.badge-sat { background: #eef2ff; color: #5b7fff; }
.badge-sun { background: #fef2f2; color: #e55c6c; }
.badge-hol { background: #fff7ed; color: #d97706; }
.badge-future { background: #ecfdf5; color: #059669; }
.badge-past { background: #f3f4f6; color: #9ca3af; }

/* 對戰組合 - 視覺化呈現 */
.matchup { display: inline-flex; align-items: center; gap: 0; }
.matchup-team { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: 600; }
.matchup-team img { width: 22px; height: 22px; object-fit: contain; }
.matchup-at { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: #f0f1f5; color: #9ca3af; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.team-brothers { background: #fef9e7; color: #b7950b; border: 1px solid #f9e79f; }
.team-lions { background: #fef5ed; color: #c0611a; border: 1px solid #fad7b0; }
.team-monkeys { background: #fdf2f2; color: #b91c1c; border: 1px solid #f5c6c6; }
.team-guardians { background: #eff4ff; color: #2b5fc3; border: 1px solid #bfdbfe; }
.team-dragons { background: #f5f0ff; color: #7c3aed; border: 1px solid #ddd6fe; }
.team-hawks { background: #ecfdf5; color: #16794a; border: 1px solid #a7f3d0; }

.filter-row { display: flex; gap: 14px; }

.empty { text-align: center; padding: 48px 20px; color: #9ca3af; font-size: 16px; }

.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { display: inline-flex; align-items: center; padding: 5px 14px; border-radius: 16px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #d0d5e0; background: #fff; color: #7f8c9b; transition: all 0.15s; user-select: none; }
.chip:hover { border-color: #5b7fff; color: #5b7fff; background: #f5f7ff; }
.chip.active { color: #fff; border-color: transparent; }
.chip.active[data-team="中信兄弟"] { background: #d4a017; }
.chip.active[data-team="統一7-ELEVEn獅"] { background: #d97218; }
.chip.active[data-team="樂天桃猿"] { background: #c53030; }
.chip.active[data-team="富邦悍將"] { background: #3b73d9; }
.chip.active[data-team="味全龍"] { background: #7c3aed; }
.chip.active[data-team="台鋼雄鷹"] { background: #16794a; }

.btn-reset { background: #f3f4f6; color: #4a5568; border: 1px solid #d0d5e0; padding: 7px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.12s; }
.btn-reset:hover { background: #e5e7eb; border-color: #9ca3af; }

/* ── 手機卡片模式 ── */
.card-list { display: none; }
.game-card { background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.card-date { font-size: 14px; font-weight: 600; color: #2c3e50; }
.card-time { font-size: 13px; color: #7f8c9b; }
.card-matchup { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 0; }
.card-team { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 72px; }
.card-team img { width: 36px; height: 36px; object-fit: contain; }
.card-team-name { font-size: 13px; font-weight: 600; }
.card-vs { font-size: 12px; color: #9ca3af; font-weight: 700; background: #f0f1f5; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f1f5; }
.card-field { font-size: 12px; color: #4a5568; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }

@media (max-width: 768px) {
  .container { max-width: 100%; }
  .filters { padding: 12px; gap: 10px; flex-direction: column; align-items: stretch; }
  .filter-group { width: 100%; }
  .filter-group select { width: 100%; min-width: unset; }
  .filter-row { display: flex; gap: 10px; }
  .filter-row .filter-group { flex: 1; }
  .cb-row { gap: 10px; }
  .header { padding: 14px 12px; }
  .header h1 { font-size: 18px; }
  .header p { font-size: 12px; }
  .stats { padding: 8px 12px; font-size: 12px; gap: 6px; }
  .table-wrap { display: none; }
  .card-list { display: flex; flex-direction: column; gap: 10px; padding: 10px 12px 28px; }
  .chip { padding: 6px 10px; font-size: 12px; }
  .btn-reset { width: 100%; text-align: center; }
}

@media (min-width: 769px) and (max-width: 1024px) {
  .table-wrap { padding: 12px 16px 28px; }
  .filters { padding: 14px 16px; }
  .header { padding: 16px; }
  .stats { padding: 8px 16px; }
}
</style>

// ── 載入資料 ──
function loadData() {
  const today = new Date(); today.setHours(0,0,0,0);
  allGames = RAW_DATA.map(r => {
    const [date, time, visitor, home, field] = r;
    const d = new Date(date + 'T00:00:00');
    const dow = d.getDay();
    return {
      date, time, visitor, home, field,
      d, dow,
      dayName: DAYS[dow],
      isWE: dow === 0 || dow === 6,
      holName: HOLIDAYS[date] || '',
      month: d.getMonth() + 1,
      isFuture: d >= today,
    };
  }).sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : a.time < b.time ? -1 : 1);
  initFilters();
  render();
}

function getSelectedTeams(containerId) {
  return [...document.querySelectorAll('#' + containerId + ' .chip.active')].map(c => c.dataset.team);
}

function initFilters() {
  const teams = [...new Set(allGames.flatMap(g => [g.visitor, g.home]))].sort();
  const fields = [...new Set(allGames.map(g => g.field))].sort();
  const months = [...new Set(allGames.map(g => g.month))].sort((a,b) => a - b);

  // Team chip buttons
  ['f-team1','f-team2'].forEach(id => {
    const container = document.getElementById(id);
    teams.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.dataset.team = t;
      chip.innerHTML = logoImg(t, 18) + (TEAM_SHORT[t] || t);
      chip.addEventListener('click', () => { chip.classList.toggle('active'); render(); });
      container.appendChild(chip);
    });
  });

  const addOpts = (sel, items, fn) => items.forEach(i => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = fn ? fn(i) : i;
    sel.appendChild(o);
  });
  addOpts(document.getElementById('f-field'), fields);
  addOpts(document.getElementById('f-month'), months, m => m + ' 月');
}

function getFiltered() {
  const sel1 = getSelectedTeams('f-team1');
  const sel2 = getSelectedTeams('f-team2');
  const fld = document.getElementById('f-field').value;
  const mon = document.getElementById('f-month').value;
  const we = document.getElementById('f-weekend').checked;
  const hol = document.getElementById('f-holiday').checked;
  const fut = document.getElementById('f-future').checked;

  return allGames.filter(g => {
    // Team 1 filter: at least one selected team must be in the game (either side)
    if (sel1.length && !sel1.includes(g.visitor) && !sel1.includes(g.home)) return false;
    // Team 2 (opponent) filter: at least one selected opponent must be in the game
    if (sel2.length && !sel2.includes(g.visitor) && !sel2.includes(g.home)) return false;
    // If both filters set, the game must involve one from each group
    if (sel1.length && sel2.length) {
      const ok = (sel1.includes(g.visitor) && sel2.includes(g.home)) ||
                 (sel2.includes(g.visitor) && sel1.includes(g.home));
      if (!ok) return false;
    }
    if (fld && g.field !== fld) return false;
    if (mon && g.month !== +mon) return false;
    if (we && !g.isWE) return false;
    if (hol && !g.isWE && !g.holName) return false;
    if (fut && !g.isFuture) return false;
    return true;
  });
}

function buildTags(g) {
  let tags = '';
  if (g.dow === 6) tags += '<span class="badge badge-sat">週六</span>';
  if (g.dow === 0) tags += '<span class="badge badge-sun">週日</span>';
  if (g.holName) tags += '<span class="badge badge-hol">' + g.holName + '</span>';
  tags += g.isFuture ? '<span class="badge badge-future">未來</span>' : '<span class="badge badge-past">已結束</span>';
  return tags;
}

function render() {
  const list = getFiltered();
  const tbody = document.getElementById('tbody');
  const emptyTable = document.getElementById('empty-table');
  const emptyCard = document.getElementById('empty-card');
  const cardList = document.getElementById('card-list');
  const stats = document.getElementById('stats');

  const weCnt = list.filter(g => g.isWE).length;
  const holCnt = list.filter(g => g.holName && !g.isWE).length;
  const futCnt = list.filter(g => g.isFuture).length;

  stats.innerHTML =
    '篩選結果：<span class="num">' + list.length + '</span> 場' +
    ' | 週末：<span class="num">' + weCnt + '</span> 場' +
    ' | 國定假日(非週末)：<span class="num">' + holCnt + '</span> 場' +
    ' | 未來場次：<span class="num">' + futCnt + '</span> 場';

  if (!list.length) {
    tbody.innerHTML = '';
    cardList.innerHTML = '';
    emptyTable.style.display = '';
    emptyCard.style.display = '';
    return;
  }
  emptyTable.style.display = 'none';
  emptyCard.style.display = 'none';

  // Desktop table
  let html = '';
  for (const g of list) {
    const dc = g.dow === 0 ? 'day-sun' : g.dow === 6 ? 'day-sat' : g.holName ? 'day-hol' : '';
    const vs = TEAM_SHORT[g.visitor] || g.visitor;
    const hs = TEAM_SHORT[g.home] || g.home;
    const vc = TEAM_CLS[g.visitor] || '';
    const hc = TEAM_CLS[g.home] || '';
    const vLogo = TEAM_LOGO[g.visitor] || '';
    const hLogo = TEAM_LOGO[g.home] || '';

    const matchup = '<div class="matchup">' +
      '<span class="matchup-team ' + vc + '">' + (vLogo ? '<img src="' + vLogo + '" alt="">' : '') + vs + '</span>' +
      '<span class="matchup-at">@</span>' +
      '<span class="matchup-team ' + hc + '">' + (hLogo ? '<img src="' + hLogo + '" alt="">' : '') + hs + '</span>' +
      '</div>';

    html += '<tr>' +
      '<td>' + g.date + '</td>' +
      '<td class="' + dc + '">' + g.dayName + '</td>' +
      '<td>' + g.time + '</td>' +
      '<td>' + matchup + '</td>' +
      '<td>' + g.field + '</td>' +
      '<td>' + buildTags(g) + '</td></tr>';
  }
  tbody.innerHTML = html;

  // Mobile cards
  let cards = '';
  for (const g of list) {
    const dc = g.dow === 0 ? 'day-sun' : g.dow === 6 ? 'day-sat' : g.holName ? 'day-hol' : '';
    const vs = TEAM_SHORT[g.visitor] || g.visitor;
    const hs = TEAM_SHORT[g.home] || g.home;
    const vc = TEAM_CLS[g.visitor] || '';
    const hc = TEAM_CLS[g.home] || '';
    const vLogo = TEAM_LOGO[g.visitor] || '';
    const hLogo = TEAM_LOGO[g.home] || '';

    cards += '<div class="game-card">' +
      '<div class="card-header">' +
        '<span class="card-date ' + dc + '">' + g.date + '（' + g.dayName + '）</span>' +
        '<span class="card-time">' + g.time + '</span>' +
      '</div>' +
      '<div class="card-matchup">' +
        '<div class="card-team">' +
          (vLogo ? '<img src="' + vLogo + '" alt="">' : '') +
          '<span class="card-team-name" style="color:' + getTeamColor(g.visitor) + '">' + vs + '</span>' +
        '</div>' +
        '<span class="card-vs">@</span>' +
        '<div class="card-team">' +
          (hLogo ? '<img src="' + hLogo + '" alt="">' : '') +
          '<span class="card-team-name" style="color:' + getTeamColor(g.home) + '">' + hs + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<span class="card-field">' + g.field + '</span>' +
        '<div class="card-tags">' + buildTags(g) + '</div>' +
      '</div>' +
    '</div>';
  }
  cardList.innerHTML = cards;
}

function getTeamColor(team) {
  const colors = { '中信兄弟':'#b7950b', '統一7-ELEVEn獅':'#c0611a', '樂天桃猿':'#b91c1c', '富邦悍將':'#2b5fc3', '味全龍':'#7c3aed', '台鋼雄鷹':'#16794a' };
  return colors[team] || '#2c3e50';
}

// ── 事件綁定 ──
['f-field','f-month'].forEach(id =>
  document.getElementById(id).addEventListener('change', render));
['f-weekend','f-holiday','f-future'].forEach(id =>
  document.getElementById(id).addEventListener('change', function() {
    if (id === 'f-weekend' && this.checked) document.getElementById('f-holiday').checked = false;
    if (id === 'f-holiday' && this.checked) document.getElementById('f-weekend').checked = false;
    render();
  }));

document.getElementById('btn-reset').addEventListener('click', function() {
  document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
  ['f-field','f-month'].forEach(id => document.getElementById(id).value = '');
  ['f-weekend','f-holiday'].forEach(id => document.getElementById(id).checked = false);
  document.getElementById('f-future').checked = true;
  render();
});

loadData();
</script>
