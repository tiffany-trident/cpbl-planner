name: Update CPBL Scores

on:
  # 排程已移除：GitHub Actions runner 位於境外，CPBL 官網封鎖境外 IP 導致抓取失敗。
  # 改由網頁「更新比分」按鈕從使用者瀏覽器（台灣 IP）透過 CORS proxy 取得即時資料。
  workflow_dispatch: # 保留手動觸發（目前同樣會因 IP 封鎖而失敗，僅作保留）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch scores and update data
        run: bash scripts/fetch-scores.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html cpbl-planner.html
          git commit -m "自動更新比賽結果 $(date -u +%Y-%m-%d)"
          git push
